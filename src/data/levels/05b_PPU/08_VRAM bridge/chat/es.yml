---
main:
  messages:
  - los juegos definen, en tiempo de ejecución, cómo debe lucir el fondo 🏞️
  - crean un mapa usando tiles y lo almacenan en la 🐏  VRAM
  responses:
  - ¿cómo puede un juego escribir en la 🐏  VRAM? [how]

how:
  messages:
  - a través de los registros de video llamados 📍  PPUAddr y 📦  PPUData
  - son como un puente que conecta la 🧠  CPU y la 🖥️  PPU
  - primero, los juegos ponen en 📍  PPUAddr la dirección PPU a la que quieren escribir
  - "(dos escrituras consecutivas: una para el byte alto, y una para el byte bajo)"
  - luego, escriben en 📦  PPUData el byte que quieren poner en esa dirección
  - <{PPUAddr_PPUData.png}>
  - esto permite que el código del juego acceda a cualquier región de la memoria de la PPU, incluyendo 👾  CHR-RAM, 🐏  VRAM y 🎨  Palette RAM
  responses:
  - (*) dame otro ejemplo 🤔 [example]
  - bien, supongo que necesito definir la VRAM en algún lugar [exercise]

example:
  messages:
  - te doy el mismo ejemplo, pero en assembly
  - supongamos que un juego de NEEES quiere escribir el byte $D7 en la dirección PPU $208F
  - el código máquina solo puede escribir en direcciones de la CPU, ¿no?
  - las direcciones PPU están en su propio espacio de direcciones, separado
  - entonces usan 📍  PPUAddr y 📦  PPUData <como puente> entre la 🧠  CPU y la 🖥️  PPU
  - |-
    en nuestro ejemplo, harían:
    ```raw
    LDA #$20
    STA $2006
    LDA #$8F
    STA $2006

    LDA #$D7
    STA $2007
    ```
  responses:
  - ...how

exercise:
  messages:
  - sí, mejor empieza por eso
  - 📚  como hiciste con `CPUMemory::ram`, agrega una propiedad llamada `vram` en 🐏  `PPUMemory`
  - el array debería almacenar 4096 bytes
  - (sé que dije varias veces que solo hay 2 KiB de VRAM, pero algunos juegos extienden esa memoria usando chips extra en su cartucho, y es más fácil emular esos simplemente asignando un gran bloque de 4 KiB 🤷 )
  - 📚  mapea el rango $2000-$2FFF a VRAM (tanto lecturas como escrituras)
  - |-
    📚  implementa estos métodos en 📍  `PPUAddr`:
    **onLoad()**:
      **->** inicializa dos propiedades:
        ```javascript this.latch = false```
        ```javascript this.address = 0```
        (usaremos estas para modelar el comportamiento alternante entre byte alto / byte bajo en cada operación de escritura)
    **onWrite(value)**:
      **->** si `latch` es ```javascript false```:
        **->** escribe solo el byte alto de `address`, usando `value`
          (deja la parte baja como estaba antes)
      **->** si es ```javascript true```:
        **->** escribe solo el byte bajo de `address`, usando `value`
          (deja la parte alta como estaba antes)
      (puedes usar `buildU16(...)`, `highByteOf(...)`, y `lowByteOf(...)`)
      **->** cambia `latch` al valor opuesto
  - |-
    📚  implementa estos métodos en 📦  `PPUData`:
    **onWrite(value)**:
      **->** escribe `value` en la dirección PPU ```javascript ppuAddr.address```
        (puedes acceder a la instancia 🐏  `PPUMemory` con ```javascript this.ppu.memory```)
        (puedes acceder a la instancia 📍  `PPUAddr` con ```javascript this.ppu.registers.ppuAddr```)
      **->** llama a ```javascript this._incrementAddress()```
    **_incrementAddress()**:
      **->** si ```javascript ppuCtrl.vramAddressIncrement32``` es ~1~:
        **->** incrementa ```javascript ppuAddr.address``` por 32
      **->** si no:
        **->** incrementa ```javascript ppuAddr.address``` 1 vez
     **[!]** asegúrate de que la dirección nunca exceda 65535 usando `byte.toU16(...)`
  - |-
    📚  por último, <modifica> en 📊  `PPUStatus`:
    **onRead()**:
      **->** luego de reiniciar `isInVBlankInterval`, también reinicia el `latch` de 📍  `PPUAddr`
  responses:
  - (*) ¿qué es este incremento de dirección? 🤔 [increment]

increment:
  messages:
  - sí, olvidé mencionarte
  - la PPU incrementa la dirección automáticamente después de escribir en 📦  PPUData
  - dependiendo de lo que esté en 🎛️  PPUCtrl, esto puede ser un ~+1~ o un ~+32~
  - este autoincremento es útil para que los juegos llenen la VRAM más rápido
  responses:
  - ...exercise

